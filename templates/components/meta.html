<div style="max-width: 70%;">
       <h3 style="margin:0; font-size:14px; color: var(--text-main); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
           {{ asset.name }}
       </h3>
       <span class="badge bg-secondary">
        📁 {{ asset.category.name if asset.category else "Uncategorized" }}
    </span>
    {% if asset.copyright_option %}
        <span class="badge bg-info" style="font-size:11px;">{{ asset.copyright_option.name }}</span>
    {% endif %}
    {% if asset.use_purpose_option %}
        <span class="badge bg-success" style="font-size:11px;">{{ asset.use_purpose_option.name }}</span>
    {% endif %}
   </div>
