<div class="asset-preview-container" style="
    width: 100%; 
    height: 200px; 
    overflow: hidden; 
    border-radius: 8px; 
    background-color: #000; 
    position: relative;">

    {% if asset.file_path.lower().endswith('.mp4') or asset.file_path.lower().endswith('.mov') %}
        {% set mime = 'video/quicktime' if asset.file_path.lower().endswith('.mov') else 'video/mp4' %}
        <video muted loop playsinline controls
               style="width: 100%; height: 100%; object-fit: cover; display: block;">
            <source src="/static/uploads/{{ asset.file_path }}" type="{{ mime }}">
        </video>
    {% else %}
        <img src="/static/uploads/{{ asset.file_path }}" 
             alt="{{ asset.name }}" 
             style="width: 100%; height: 100%; object-fit: cover; display: block;">
    {% endif %}

</div>
