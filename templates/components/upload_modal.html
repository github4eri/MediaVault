<style>
	/* Hide the ugly default input */
	input[type="file"] {
		display: none;
	}

	.custom-file-upload {
		border: 1px solid #ccc;
		display: inline-block;
		padding: 10px 20px;
		cursor: pointer;
		background-color: #f8f9fa;
		border-radius: 5px;
		font-weight: bold;
	}
</style>


<div id="uploadModal" class="modal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background-color:rgba(0,0,0,0.6);">
    
    <div class="modal-content" style="background-color:white; margin:5% auto; padding:30px; width:90%; max-width:450px; border-radius:12px; position:relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-family: sans-serif;">
        
        <span class="close-btn" onclick="closeUploadModal()" style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:28px; font-weight:bold; color:#666;">&times;</span>
        
        <h2 style="margin-top:0; color: #333;">📤 Add to Vault</h2>
        
        <form action="/upload/" method="POST" enctype="multipart/form-data">
            
            <label style="display:block; margin-bottom:5px; font-weight:bold;">Asset Title</label>
            <input type="text" name="asset_title" placeholder="Give it a name..." required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:6px; box-sizing: border-box;">

            <label style="display:block; margin-bottom:5px; font-weight:bold;">Category</label>
            <select name="category_name" required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:6px; background-color: white;">
                <option value="" disabled selected>-- Select a Category --</option>
                {% for category in categories %}
                    <option value="{{ category.name }}">{{ category.name }}</option>
                {% endfor %}
            </select>

            <label style="display:block; margin-bottom:5px; font-weight:bold;">Choose Media</label>
            <div class="custom-file-upload-container" style="margin-bottom: 25px;">
                <input type="file" name="file" id="file-upload" required 
                       onchange="updateFileName(this)" style="display: none;">
                
                <label for="file-upload" style="display: block; padding: 12px; background: #f8f9fa; border: 2px dashed #007bff; border-radius: 8px; cursor: pointer; font-weight: 500; text-align: center; color: #007bff;">
                    <i class="fas fa-upload"></i> Browse Files...
                </label>
                
                <div id="file-chosen" style="font-size: 13px; color: #666; margin-top: 8px; text-align: center; font-style: italic;">No file selected</div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" style="flex: 2; padding:12px; background-color:#007bff; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold; font-size: 16px;">
                    Save to Vault
                </button>
                
                <button type="button" onclick="closeUploadModal()" style="flex: 1; background:#95a5a6; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

<script>
// 1. Function to close the modal
function closeUploadModal() {
    const modal = document.getElementById('uploadModal');
    if (modal) {
        modal.style.display = 'none';
    }
}

// 2. Function to update the English text when a file is picked
function updateFileName(input) {
    const display = document.getElementById('file-chosen');
    if (input.files && input.files.length > 0) {
        display.textContent = "Selected: " + input.files[0].name;
        display.style.color = "#28a745"; // Change to green on success
    } else {
        display.textContent = "No file selected";
        display.style.color = "#666";
    }
}

// 3. Close if clicking outside the white box
window.addEventListener('click', function(event) {
    const modal = document.getElementById('uploadModal');
    if (event.target == modal) {
        modal.style.display = "none";
    }
});
</script>
