<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Media Vault</title>
    <style>
        :root {
            --bg-color: #f5f7f9;
            --card-bg: #ffffff;
            --accent-primary: #8b8b8b;
            --accent-secondary: #dcdde1;
            --text-main: #2f3640;
            --text-dim: #7f8c8d;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        body { background: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 30px; }
        .container { max-width: 1100px; margin: 0 auto; }

        /* HEADER */
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* BUTTONS - Perfectly Symmetrical */
        .btn {
            height: 42px; padding: 0 20px; border-radius: 10px;
            border: 1px solid var(--accent-secondary); background: white;
            font-size: 14px; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; justify-content: center;
            text-decoration: none; color: var(--text-main); transition: 0.2s;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <h1>Admin Dashboard</h1>
        <a href="/" class="btn">← Back to Library</a>
    </div>

    {% include 'components/category_manager.html' %}

    {% include 'components/admin_tools.html' %}
</div>

</body>
</html>
