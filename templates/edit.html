<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Asset - MediaVault Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Edit Asset Details</h4>
                </div>
                <div class="card-body">
                    <div class="text-center mb-4">
                        <img src="/static/uploads/{{ asset.file_path }}" class="img-thumbnail" style="max-height: 200px;">
                    </div>

                    <form action="/edit/{{ asset.id }}" method="post">
                        
                     <div class="mb-3">
                         <label class="form-label">Photo Name</label>
                         <input type="text" name="name" class="form-control" value="{{ asset.name }}" required>
                     </div>
                 
                     <div class="mb-3">
                         <label class="form-label">Category</label>
                         <select name="category_id" class="form-select">
                             {% for cat in categories %}
                                 <option value="{{ cat.id }}" {% if cat.id == asset.category_id %}selected{% endif %}>
                                     {{ cat.name }}
                                 </option>
                             {% endfor %}
                         </select>
                     </div>

                     {% for group in subcategory_groups %}
                     <div class="mb-3">
                         <label class="form-label">{{ group.name }}</label>
                         {% if group.name == 'Copyright Status' %}
                         <select name="copyright_option_id" class="form-select">
                             <option value="">-- Optional --</option>
                             {% for option in group.options %}
                                 <option value="{{ option.id }}" {% if option.id == asset.copyright_option_id %}selected{% endif %}>
                                     {{ option.name }}
                                 </option>
                             {% endfor %}
                         </select>
                         {% elif group.name == 'Use Purpose' %}
                         <select name="use_purpose_option_id" class="form-select">
                             <option value="">-- Optional --</option>
                             {% for option in group.options %}
                                 <option value="{{ option.id }}" {% if option.id == asset.use_purpose_option_id %}selected{% endif %}>
                                     {{ option.name }}
                                 </option>
                             {% endfor %}
                         </select>
                         {% endif %}
                     </div>
                     {% endfor %}

                     <div class="mb-3">
                         <label class="form-label">AI Tags (Comma separated)</label>
                         <textarea name="ai_tags" class="form-control" rows="3">{{ asset.ai_tags }}</textarea>
                     </div>
                 
                     <div class="d-flex justify-content-between">
                         <a href="/" class="btn btn-secondary">Cancel</a>
                         <button type="submit" class="btn btn-success">Save Changes</button>
                     </div>
                 </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
